<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Job Applications</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <span class="eyebrow">Application Command Center</span>
          <h1>Job Applications</h1>
          <p class="hero-copy">Track applications, CV versions, reminders, reports, and AI outputs in one local workspace.</p>
          <p id="summary">Loading</p>
        </div>
        <div class="topbar-actions">
          <input id="importCsvInput" type="file" accept=".csv,text/csv" hidden>
          <input id="restoreBackupInput" type="file" accept=".json,application/json" hidden>
          <button id="cvManagerButton" class="secondary" type="button">CVs</button>
          <button id="newApplicationButton" type="button">New Application</button>
        </div>
      </header>

      <main>
        <section id="workspaceRoot" class="workspace-root" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="applicationDialog">
      <form id="applicationForm" method="dialog" enctype="multipart/form-data">
        <div class="dialog-header">
          <h2>New Application</h2>
          <button class="icon-button" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <label>
            <span>Company Name</span>
            <input name="company_name" required>
          </label>
          <label>
            <span>Role</span>
            <input name="role_title" placeholder="Frontend Developer">
          </label>
          <label>
            <span>Job Link</span>
            <input name="job_link" type="url">
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option value="applied">Applied</option>
              <option value="interview_scheduled">Interview Scheduled</option>
              <option value="offer">Offer</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
              <option value="withdrawn">Withdrawn</option>
              <option value="ghosted">Ghosted</option>
            </select>
          </label>
          <label>
            <span>Salary</span>
            <input name="salary" placeholder="$120k, 18 LPA">
          </label>
          <label>
            <span>Location</span>
            <input name="location" placeholder="Remote, Bengaluru">
          </label>
          <label>
            <span>Recruiter</span>
            <input name="recruiter" placeholder="Recruiter name or email">
          </label>
          <label>
            <span>Contact Person</span>
            <input name="contact_person" placeholder="Hiring manager">
          </label>
          <label>
            <span>Date Applied</span>
            <input name="applied_date" type="date">
          </label>
          <label>
            <span>Interview Date</span>
            <input name="interview_date" type="date">
          </label>
          <label>
            <span>Tags</span>
            <input name="tags" placeholder="Remote, Backend">
          </label>
          <label>
            <span>Existing CV</span>
            <select name="cv_id" id="applicationCvSelect"></select>
          </label>
          <label>
            <span>Upload CV</span>
            <input name="cv" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
          </label>
          <label class="wide">
            <span>Job Description</span>
            <textarea name="job_description" rows="7"></textarea>
          </label>
          <label class="wide">
            <span>Notes</span>
            <textarea name="notes" rows="3"></textarea>
          </label>
        </div>
        <p class="form-error" id="applicationError" hidden></p>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="applicationEditDialog">
      <form id="applicationEditForm" method="dialog">
        <div class="dialog-header">
          <h2>Edit Application</h2>
          <button class="icon-button" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <input name="id" type="hidden">
          <label>
            <span>Company Name</span>
            <input name="company_name" required>
          </label>
          <label>
            <span>Role</span>
            <input name="role_title" placeholder="Frontend Developer">
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option value="applied">Applied</option>
              <option value="interview_scheduled">Interview Scheduled</option>
              <option value="offer">Offer</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
              <option value="withdrawn">Withdrawn</option>
              <option value="ghosted">Ghosted</option>
            </select>
          </label>
          <label>
            <span>Salary</span>
            <input name="salary" placeholder="$120k, 18 LPA">
          </label>
          <label>
            <span>Location</span>
            <input name="location" placeholder="Remote, Bengaluru">
          </label>
          <label>
            <span>Recruiter</span>
            <input name="recruiter" placeholder="Recruiter name or email">
          </label>
          <label>
            <span>Contact Person</span>
            <input name="contact_person" placeholder="Hiring manager">
          </label>
          <label>
            <span>Applied Date</span>
            <input name="applied_date" type="date">
          </label>
          <label>
            <span>Interview Date</span>
            <input name="interview_date" type="date">
          </label>
          <label class="wide">
            <span>Job Link</span>
            <input name="job_link" type="url" placeholder="https://company.com/job">
          </label>
        </div>
        <p class="form-error" id="applicationEditError" hidden></p>
        <div class="split-actions">
          <div>
            <button class="secondary" type="button" data-archive-action>Archive</button>
            <button class="secondary" type="button" data-restore-action hidden>Restore</button>
            <button class="danger" type="button" data-delete-action>Delete</button>
          </div>
          <div>
            <button class="secondary" type="button" data-close-dialog>Cancel</button>
            <button type="submit">Save Changes</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog">
      <div class="dialog-header">
        <h2 id="detailTitle">Application</h2>
        <button class="icon-button" type="button" data-close-dialog>Close</button>
      </div>
      <div id="detailContent" class="detail-layout"></div>
    </dialog>

    <dialog id="cvDialog">
      <div class="dialog-header">
        <h2>CV Versions</h2>
        <button class="icon-button" type="button" data-close-dialog>Close</button>
      </div>
      <form id="cvForm" class="cv-form" enctype="multipart/form-data">
        <label>
          <span>Version Label</span>
          <input name="version_label" placeholder="Backend CV">
        </label>
        <label>
          <span>CV File</span>
          <input name="cv" required type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </label>
        <label class="checkbox">
          <input name="is_latest" type="checkbox" checked>
          <span>Mark latest</span>
        </label>
        <button type="submit">Upload</button>
      </form>
      <p class="form-error" id="cvError" hidden></p>
      <div id="cvList" class="cv-list"></div>
    </dialog>

    <dialog id="jobBoardDialog">
      <form id="jobBoardForm" method="dialog">
        <div class="dialog-header">
          <h2 id="jobBoardDialogTitle">Track Job Board</h2>
          <button class="icon-button" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <input name="id" type="hidden">
          <label>
            <span>Board Name</span>
            <input name="name" required placeholder="LinkedIn Jobs">
          </label>
          <label>
            <span>URL</span>
            <input name="url" type="url" placeholder="https://www.linkedin.com/jobs/">
          </label>
          <label>
            <span>Last Checked</span>
            <input name="last_checked_date" type="text" inputmode="numeric" autocomplete="off" placeholder="DD-MM-YYYY" data-date-input>
          </label>
          <label class="checkbox inline-checkbox">
            <input name="is_active" type="checkbox" checked>
            <span>Active source</span>
          </label>
          <label class="wide">
            <span>Notes</span>
            <textarea name="notes" rows="4" placeholder="Target roles, filters, alerts, or specific search URLs"></textarea>
          </label>
        </div>
        <p class="form-error" id="jobBoardError" hidden></p>
        <div class="dialog-actions">
          <button id="jobBoardResetButton" class="secondary" type="button">Clear</button>
          <button type="submit">Save Board</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirmDialog">
      <div class="dialog-header">
        <h2 id="confirmDialogTitle">Confirm Action</h2>
        <button class="icon-button" type="button" data-close-dialog>Close</button>
      </div>
      <div class="dialog-body">
        <p id="confirmDialogBody"></p>
        <p id="confirmDialogError" class="form-error" hidden></p>
      </div>
      <div class="dialog-actions">
        <button id="confirmDialogCancel" class="secondary" type="button">Cancel</button>
        <button id="confirmDialogAccept" class="danger" type="button">Confirm</button>
      </div>
    </dialog>

    <dialog id="editorDialog">
      <form id="editorDialogForm" method="dialog">
        <div class="dialog-header">
          <h2 id="editorDialogTitle">Edit</h2>
          <button class="icon-button" type="button" data-close-dialog>Close</button>
        </div>
        <div class="dialog-body">
          <label class="wide">
            <span id="editorDialogLabel">Value</span>
            <textarea id="editorDialogInput" rows="4"></textarea>
          </label>
          <p id="editorDialogError" class="form-error" hidden></p>
        </div>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button id="editorDialogSubmit" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <section id="appToast" class="app-toast-stack" aria-live="polite" aria-atomic="false"></section>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
