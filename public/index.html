<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Job Tracker</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true">
            <i class="bi bi-chevron-left" id="sidebarToggleIcon"></i>
          </button>
          <div class="sidebar-brand-copy">
            <b>Job Tracker</b>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Sections">
          <div class="nav-group-label">Pipeline</div>
          <button class="nav-item is-active" type="button" data-view="list" aria-pressed="true"><span class="nav-ic" aria-hidden="true"><i class="bi bi-list-ul"></i></span><span class="nav-text">List</span></button>
          <button class="nav-item" type="button" data-view="kanban" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-kanban"></i></span><span class="nav-text">Kanban</span></button>
          <button class="nav-item" type="button" data-view="insights" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-bar-chart"></i></span><span class="nav-text">Insights</span></button>

          <div class="nav-group-label">Workspace</div>
          <button class="nav-item" type="button" data-view="reminders" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-calendar3"></i></span><span class="nav-text">Timeline</span></button>
          <button class="nav-item" type="button" data-view="activity" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-activity"></i></span><span class="nav-text">Activity</span></button>
          <button class="nav-item" type="button" data-view="boards" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-grid-3x3-gap"></i></span><span class="nav-text">Job Boards</span></button>
          <button class="nav-item" type="button" data-view="companies" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-buildings"></i></span><span class="nav-text">Company List</span></button>
          <button class="nav-item" type="button" data-view="toolkit" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-tools"></i></span><span class="nav-text">Toolkit</span></button>
          <button class="nav-item" type="button" data-view="settings" aria-pressed="false"><span class="nav-ic" aria-hidden="true"><i class="bi bi-gear"></i></span><span class="nav-text">Settings</span></button>
        </nav>

        <div class="sidebar-footer">
          <input id="importCsvInput" type="file" accept=".csv,text/csv" hidden>
          <input id="restoreBackupInput" type="file" accept=".json,application/json" hidden>
          <button id="cvManagerButton" class="secondary sidebar-btn" type="button"><span class="nav-ic" aria-hidden="true"><i class="bi bi-file-earmark-person"></i></span><span class="nav-text">CVs</span></button>
          <button id="newApplicationButton" class="sidebar-btn primary-btn" type="button"><span class="nav-ic" aria-hidden="true"><i class="bi bi-plus-lg"></i></span><span class="nav-text">New Application</span></button>
        </div>
      </aside>

      <div class="content">
        <header class="content-header">
          <div class="content-header-copy">
            <h1>Applications</h1>
            <p id="summary">Loading</p>
          </div>
        </header>
        <main>
          <section id="workspaceRoot" class="workspace-root" aria-live="polite"></section>
        </main>
      </div>
    </div>

    <dialog id="applicationDialog" class="modal-md">
      <form id="applicationForm" method="dialog" enctype="multipart/form-data">
        <div class="dialog-header">
          <h2>New Application</h2>
          <button class="secondary" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid new-application-grid">
          <fieldset class="form-section form-section-primary">
            <legend>Basics</legend>
            <label>
              <span>Company Name</span>
              <input name="company_name" required>
            </label>
            <label>
              <span>Company Category</span>
              <select name="company_category">
                <option value="">-- Select Category --</option>
                <option value="Service-Based (TCS, Infosys)">Service-Based (TCS, Infosys)</option>
                <option value="Early Startups (Seed/Series A)">Early Startups (Seed/Series A)</option>
                <option value="Well-Funded Startups">Well-Funded Startups</option>
                <option value="Mid-Size Product (Swiggy, CRED)">Mid-Size Product (Swiggy, CRED)</option>
                <option value="FAANG / Top-Tier Global">FAANG / Top-Tier Global</option>
                <option value="US Remote (Wellfound)">US Remote (Wellfound)</option>
                <option value="Other / Uncategorized">Other / Uncategorized</option>
              </select>
            </label>
            <label>
              <span>Role</span>
              <input name="role_title" placeholder="Frontend Developer">
            </label>
            <label>
              <span>Status</span>
              <select name="status">
                <option value="applied">Applied</option>
                <option value="interview_scheduled">Interview Scheduled</option>
                <option value="offer">Offer</option>
                <option value="accepted">Accepted</option>
                <option value="rejected">Rejected</option>
                <option value="withdrawn">Withdrawn</option>
                <option value="ghosted">Ghosted</option>
              </select>
            </label>
            <label>
              <span>Date Applied</span>
              <input name="applied_date" type="date">
            </label>
            <label>
              <span>Job Link</span>
              <input name="job_link" type="url">
            </label>
            <label>
              <span>Location</span>
              <input name="location" placeholder="Remote, Bengaluru">
            </label>
          </fieldset>
          <fieldset class="form-section">
            <legend>Tracking</legend>
            <label>
              <span>Interview Date</span>
              <input name="interview_date" type="date">
            </label>
            <label>
              <span>Next Action</span>
              <input name="next_action" placeholder="Follow up, prep system design, wait">
            </label>
            <label>
              <span>Next Action Due</span>
              <input name="next_action_due_date" type="date">
            </label>
            <label>
              <span>Tags</span>
              <input name="tags" placeholder="Remote, Backend">
            </label>
            <label>
              <span>Salary</span>
              <input name="salary" placeholder="$120k, 18 LPA">
            </label>
            <label>
              <span>Recruiter</span>
              <input name="recruiter" placeholder="Recruiter name or email">
            </label>
            <label>
              <span>Contact Person</span>
              <input name="contact_person" placeholder="Hiring manager">
            </label>
          </fieldset>
          <fieldset class="form-section">
            <legend>CV</legend>
            <label>
              <span>Existing CV</span>
              <select name="cv_id" id="applicationCvSelect"></select>
            </label>
            <label>
              <span>Upload CV</span>
              <input name="cv" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            </label>
          </fieldset>
          <fieldset class="form-section form-section-wide">
            <legend>Notes</legend>
            <label class="wide">
              <span>Job Description</span>
              <textarea name="job_description" rows="7"></textarea>
            </label>
            <label class="wide">
              <span>Notes</span>
              <textarea name="notes" rows="3"></textarea>
            </label>
          </fieldset>
        </div>
        <p class="form-error" id="applicationError" hidden></p>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="applicationEditDialog" class="modal-md">
      <form id="applicationEditForm" method="dialog">
        <div class="dialog-header">
          <h2>Edit Application</h2>
          <button class="secondary" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <input name="id" type="hidden">
          <label>
            <span>Company Name</span>
            <input name="company_name" required aria-label="Modify company">
          </label>
          <label>
            <span>Company Category</span>
            <select name="company_category" aria-label="Modify company category">
              <option value="">-- Select Category --</option>
              <option value="Service-Based (TCS, Infosys)">Service-Based (TCS, Infosys)</option>
              <option value="Early Startups (Seed/Series A)">Early Startups (Seed/Series A)</option>
              <option value="Well-Funded Startups">Well-Funded Startups</option>
              <option value="Mid-Size Product (Swiggy, CRED)">Mid-Size Product (Swiggy, CRED)</option>
              <option value="FAANG / Top-Tier Global">FAANG / Top-Tier Global</option>
              <option value="US Remote (Wellfound)">US Remote (Wellfound)</option>
              <option value="Other / Uncategorized">Other / Uncategorized</option>
            </select>
          </label>
          <label>
            <span>Role</span>
            <input name="role_title" placeholder="Frontend Developer" aria-label="Modify role">
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option value="applied">Applied</option>
              <option value="interview_scheduled">Interview Scheduled</option>
              <option value="offer">Offer</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
              <option value="withdrawn">Withdrawn</option>
              <option value="ghosted">Ghosted</option>
            </select>
          </label>
          <label>
            <span>Salary</span>
            <input name="salary" placeholder="$120k, 18 LPA">
          </label>
          <label>
            <span>Location</span>
            <input name="location" placeholder="Remote, Bengaluru">
          </label>
          <label>
            <span>Recruiter</span>
            <input name="recruiter" placeholder="Recruiter name or email">
          </label>
          <label>
            <span>Contact Person</span>
            <input name="contact_person" placeholder="Hiring manager">
          </label>
          <label>
            <span>Applied Date</span>
            <input name="applied_date" type="date">
          </label>
          <label>
            <span>Interview Date</span>
            <input name="interview_date" type="date">
          </label>
          <label>
            <span>Next Action</span>
            <input name="next_action" placeholder="Follow up, prep, wait">
          </label>
          <label>
            <span>Next Action Due</span>
            <input name="next_action_due_date" type="date">
          </label>
          <label class="wide">
            <span>Job Link</span>
            <input name="job_link" type="url" placeholder="https://company.com/job" aria-label="Modify posting URL">
          </label>
          <label class="wide">
            <span>Tags</span>
            <input name="tags" placeholder="Remote, Backend" aria-label="Modify tags">
          </label>
          <label class="wide">
            <span>Job Description</span>
            <textarea name="job_description" rows="5"></textarea>
          </label>
          <label class="wide">
            <span>Notes</span>
            <textarea name="notes" rows="3"></textarea>
          </label>
        </div>
        <p class="form-error" id="applicationEditError" hidden></p>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog" class="modal-lg">
      <div class="dialog-header">
        <h2 id="detailTitle">Application</h2>
        <button class="secondary" type="button" data-close-dialog>Close</button>
      </div>
      <div id="detailContent" class="detail-layout"></div>
    </dialog>

    <dialog id="cvDialog" class="modal-md">
      <div class="dialog-header">
        <h2>CV Versions</h2>
        <button class="secondary" type="button" data-close-dialog>Close</button>
      </div>
      <form id="cvForm" class="cv-form" enctype="multipart/form-data">
        <label>
          <span>Version Label</span>
          <input name="version_label" placeholder="Backend CV">
        </label>
        <label>
          <span>CV File</span>
          <input name="cv" required type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </label>
        <label class="checkbox">
          <input name="is_latest" type="checkbox" checked>
          <span>Mark latest</span>
        </label>
        <button type="submit">Upload</button>
      </form>
      <p class="form-error" id="cvError" hidden></p>
      <div id="cvList" class="cv-list"></div>
    </dialog>

    <dialog id="jobBoardDialog" class="modal-md">
      <form id="jobBoardForm" method="dialog">
        <div class="dialog-header">
          <h2 id="jobBoardDialogTitle">Add Job Board</h2>
          <button class="secondary" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <input name="id" type="hidden">
          <label>
            <span>Board Name</span>
            <input name="name" required placeholder="LinkedIn Jobs">
          </label>
          <label>
            <span>URL</span>
            <input name="url" type="url" placeholder="https://www.linkedin.com/jobs/">
          </label>
          <label>
            <span>Last Checked</span>
            <input name="last_checked_date" type="text" inputmode="numeric" autocomplete="off" placeholder="DD-MM-YYYY" data-date-input>
          </label>
          <label class="checkbox inline-checkbox">
            <input name="is_active" type="checkbox" checked>
            <span>Active source</span>
          </label>
          <label class="wide">
            <span>Notes</span>
            <textarea name="notes" rows="4" placeholder="Target roles, filters, alerts, or specific search URLs"></textarea>
          </label>
        </div>
        <p class="form-error" id="jobBoardError" hidden></p>
        <div class="dialog-actions">
          <button id="jobBoardResetButton" class="secondary" type="button">Clear</button>
          <button type="submit">Save Board</button>
        </div>
      </form>
    </dialog>

    <dialog id="targetCompanyDialog" class="modal-md">
      <form id="targetCompanyForm" method="dialog">
        <div class="dialog-header">
          <h2 id="targetCompanyDialogTitle">Add Company</h2>
          <button class="secondary" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <input name="id" type="hidden">
          <label>
            <span>Target Name</span>
            <input name="name" required placeholder="Zalando">
          </label>
          <label>
            <span>Region</span>
            <input name="region" placeholder="Germany">
          </label>
          <label>
            <span>Career URL</span>
            <input name="career_url" type="url" placeholder="https://company.com/careers">
          </label>
          <label>
            <span>LinkedIn URL</span>
            <input name="linkedin_url" type="url" placeholder="https://www.linkedin.com/company/company">
          </label>
          <label>
            <span>Company URL</span>
            <input name="company_url" type="url" placeholder="https://company.com">
          </label>
          <label>
            <span>Primary Location</span>
            <input name="primary_location" placeholder="Berlin">
          </label>
          <label>
            <span>Germany Offices</span>
            <input name="germany_offices" placeholder="Berlin, Hamburg">
          </label>
          <label>
            <span>Additional Offices</span>
            <input name="additional_offices" placeholder="Amsterdam, London">
          </label>
          <label>
            <span>Industry</span>
            <input name="industry" placeholder="Fintech">
          </label>
          <label>
            <span>Company Type</span>
            <input name="company_type" placeholder="SaaS">
          </label>
          <label>
            <span>Work Mode</span>
            <input name="work_mode" placeholder="Hybrid">
          </label>
          <label>
            <span>Employee Count</span>
            <input name="employee_count" placeholder="1,000+">
          </label>
          <label>
            <span>Visa Signal</span>
            <input name="visa_signal" placeholder="Role-specific">
          </label>
          <label>
            <span>Relocation Signal</span>
            <input name="relocation_signal" placeholder="Relocation-friendly">
          </label>
          <label>
            <span>Last Checked</span>
            <input name="last_checked_date" type="text" inputmode="numeric" autocomplete="off" placeholder="DD-MM-YYYY" data-date-input>
          </label>
          <label class="checkbox inline-checkbox">
            <input name="is_active" type="checkbox" checked>
            <span>Active target</span>
          </label>
          <label class="wide">
            <span>Description</span>
            <textarea name="description" rows="3" placeholder="What the company does"></textarea>
          </label>
          <label class="wide">
            <span>Fit Notes</span>
            <textarea name="fit_notes" rows="3" placeholder="Stack fit, hiring pattern, application notes"></textarea>
          </label>
          <label>
            <span>Source</span>
            <input name="source" placeholder="Notion, HTML import">
          </label>
          <label>
            <span>Source Notes</span>
            <input name="source_notes" placeholder="Role-specific fields may change">
          </label>
        </div>
        <p class="form-error" id="targetCompanyError" hidden></p>
        <div class="dialog-actions">
          <button id="targetCompanyResetButton" class="secondary" type="button">Clear</button>
          <button type="submit">Save Company</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirmDialog" class="modal-sm">
      <div class="dialog-header">
        <h2 id="confirmDialogTitle">Confirm Action</h2>
        <button class="secondary" type="button" data-close-dialog>Close</button>
      </div>
      <div class="dialog-body">
        <p id="confirmDialogBody"></p>
        <p id="confirmDialogError" class="form-error" hidden></p>
      </div>
      <div class="dialog-actions">
        <button id="confirmDialogCancel" class="secondary" type="button">Cancel</button>
        <button id="confirmDialogAccept" class="danger" type="button">Confirm</button>
      </div>
    </dialog>

    <dialog id="promptDialog" class="small-dialog">
      <form id="promptDialogForm" method="dialog">
        <div class="dialog-header">
          <h3 id="promptDialogTitle">Update Label</h3>
          <button class="secondary" type="button" data-close-dialog>Close</button>
        </div>
        <div class="dialog-body">
          <label class="wide" style="margin: 0;">
            <span id="promptDialogLabel">Enter value:</span>
            <input type="text" id="promptDialogInput" required autocomplete="off" style="width: 100%; box-sizing: border-box; margin-top: 8px;" />
          </label>
        </div>
        <div class="dialog-actions">
          <button id="promptDialogCancel" class="secondary" type="button">Cancel</button>
          <button id="promptDialogSubmit" type="submit">Save</button>
        </div>
      </form>
    </dialog>
    <dialog id="editorDialog">
      <form id="editorDialogForm" method="dialog">
        <div class="dialog-header">
          <h2 id="editorDialogTitle">Edit</h2>
          <button class="secondary" type="button" data-close-dialog>Close</button>
        </div>
        <div class="dialog-body">
          <label class="wide">
            <span id="editorDialogLabel">Value</span>
            <textarea id="editorDialogInput" rows="4"></textarea>
          </label>
          <p id="editorDialogError" class="form-error" hidden></p>
        </div>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button id="editorDialogSubmit" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <section id="appToast" class="app-toast-stack" aria-live="polite" aria-atomic="false"></section>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
