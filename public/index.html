<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Applications</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Job Applications</h1>
        <p id="summary">Loading</p>
      </div>
      <div class="topbar-actions">
        <button id="exportCsvButton" class="secondary" type="button">Export CSV</button>
        <button id="importCsvButton" class="secondary" type="button">Import CSV</button>
        <input id="importCsvInput" type="file" accept=".csv,text/csv" hidden>
        <button id="cvManagerButton" class="secondary" type="button">CVs</button>
        <button id="newApplicationButton" type="button">New Application</button>
      </div>
    </header>

    <main>
      <section id="notificationsPanel" class="notifications-panel" hidden></section>

      <nav class="view-tabs" aria-label="Views">
        <button class="secondary is-active" type="button" data-view="list">List</button>
        <button class="secondary" type="button" data-view="reminders">Reminders</button>
        <button class="secondary" type="button" data-view="kanban">Kanban</button>
        <button class="secondary" type="button" data-view="reports">Reports</button>
        <button class="secondary" type="button" data-view="activity">Activity</button>
      </nav>

      <section id="listView">
        <section class="toolbar" aria-label="Filters">
        <label>
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Company">
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter">
            <option value="">All</option>
            <option value="applied">Applied</option>
            <option value="interview_scheduled">Interview Scheduled</option>
            <option value="offer">Offer</option>
            <option value="accepted">Accepted</option>
            <option value="rejected">Rejected</option>
            <option value="withdrawn">Withdrawn</option>
            <option value="ghosted">Ghosted</option>
          </select>
        </label>
        <label>
          <span>Tag</span>
          <input id="tagFilter" type="search" placeholder="Remote">
        </label>
        <label>
          <span>View</span>
          <select id="archiveFilter">
            <option value="false">Active</option>
            <option value="true">Archived</option>
            <option value="all">All</option>
          </select>
        </label>
        <label>
          <span>Saved Filter</span>
          <select id="savedFilterSelect">
            <option value="">Current filters</option>
          </select>
        </label>
        <label>
          <span>Save As</span>
          <input id="savedFilterName" type="text" placeholder="Interview week">
        </label>
        <div class="toolbar-actions">
          <button id="saveFilterButton" class="secondary" type="button">Save Filter</button>
          <button id="deleteFilterButton" class="secondary" type="button">Delete Filter</button>
        </div>
        </section>

        <section class="table-shell" aria-live="polite">
          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Applied</th>
                <th>Status</th>
                <th>State</th>
                <th>Interview</th>
                <th>Days</th>
                <th>Tags</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="applicationsTable"></tbody>
          </table>
          <div id="emptyState" class="empty" hidden>No applications match the current filters.</div>
        </section>
      </section>

      <section id="remindersView" class="view-panel" hidden>
        <div id="remindersList" class="panel-grid"></div>
      </section>

      <section id="kanbanView" class="view-panel" hidden>
        <div id="kanbanBoard" class="kanban-board"></div>
      </section>

      <section id="reportsView" class="view-panel" hidden>
        <div id="reportsContent" class="reports-grid"></div>
      </section>

      <section id="activityView" hidden>
        <section class="toolbar" aria-label="Activity filters">
          <label>
            <span>Search Activity</span>
            <input id="activitySearchInput" type="search" placeholder="Company, action, detail">
          </label>
        </section>
        <section class="table-shell" aria-live="polite">
          <table>
            <thead>
              <tr>
                <th>When</th>
                <th>Application</th>
                <th>Action</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="activityTable"></tbody>
          </table>
          <div id="activityEmptyState" class="empty" hidden>No activity found.</div>
        </section>
        <div class="pagination" id="activityPagination"></div>
      </section>
    </main>

    <dialog id="applicationDialog">
      <form id="applicationForm" method="dialog" enctype="multipart/form-data">
        <div class="dialog-header">
          <h2>New Application</h2>
          <button class="icon-button" value="cancel" type="button" data-close-dialog>Close</button>
        </div>
        <div class="form-grid">
          <label>
            <span>Company Name</span>
            <input name="company_name" required>
          </label>
          <label>
            <span>Job Link</span>
            <input name="job_link" type="url">
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option value="applied">Applied</option>
              <option value="interview_scheduled">Interview Scheduled</option>
              <option value="offer">Offer</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
              <option value="withdrawn">Withdrawn</option>
              <option value="ghosted">Ghosted</option>
            </select>
          </label>
          <label>
            <span>Salary</span>
            <input name="salary" placeholder="$120k, 18 LPA">
          </label>
          <label>
            <span>Location</span>
            <input name="location" placeholder="Remote, Bengaluru">
          </label>
          <label>
            <span>Recruiter</span>
            <input name="recruiter" placeholder="Recruiter name or email">
          </label>
          <label>
            <span>Contact Person</span>
            <input name="contact_person" placeholder="Hiring manager">
          </label>
          <label>
            <span>Date Applied</span>
            <input name="applied_date" type="date">
          </label>
          <label>
            <span>Interview Date</span>
            <input name="interview_date" type="date">
          </label>
          <label>
            <span>Tags</span>
            <input name="tags" placeholder="Remote, Backend">
          </label>
          <label>
            <span>Existing CV</span>
            <select name="cv_id" id="applicationCvSelect"></select>
          </label>
          <label>
            <span>Upload CV</span>
            <input name="cv" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
          </label>
          <label class="wide">
            <span>Job Description</span>
            <textarea name="job_description" rows="7"></textarea>
          </label>
          <label class="wide">
            <span>Notes</span>
            <textarea name="notes" rows="3"></textarea>
          </label>
        </div>
        <p class="form-error" id="applicationError" hidden></p>
        <div class="dialog-actions">
          <button class="secondary" type="button" data-close-dialog>Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog">
      <div class="dialog-header">
        <h2 id="detailTitle">Application</h2>
        <button class="icon-button" type="button" data-close-dialog>Close</button>
      </div>
      <div id="detailContent" class="detail-layout"></div>
    </dialog>

    <dialog id="cvDialog">
      <div class="dialog-header">
        <h2>CV Versions</h2>
        <button class="icon-button" type="button" data-close-dialog>Close</button>
      </div>
      <form id="cvForm" class="cv-form" enctype="multipart/form-data">
        <label>
          <span>Version Label</span>
          <input name="version_label" placeholder="Backend CV">
        </label>
        <label>
          <span>CV File</span>
          <input name="cv" required type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </label>
        <label class="checkbox">
          <input name="is_latest" type="checkbox" checked>
          <span>Mark latest</span>
        </label>
        <button type="submit">Upload</button>
      </form>
      <p class="form-error" id="cvError" hidden></p>
      <div id="cvList" class="cv-list"></div>
    </dialog>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
